<svg width="900" height="700" viewBox="0 0 900 700" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Stilisierte Illustration zu Schwangerschaft und Geborgenheit">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#F28C5B"/>
      <stop offset="100%" stop-color="#F6A77E"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#2B1B14" flood-opacity=".12"/>
    </filter>
  </defs>

  <!-- Hintergrund-Blob -->
  <g opacity="0.35">
    <ellipse cx="460" cy="360" rx="360" ry="250" fill="#FFD7C2"/>
  </g>

  <!-- Figur 1 -->
  <g filter="url(#soft)">
    <path d="M300 520c-40-40-60-90-60-140 0-88 62-160 150-160 64 0 110 32 134 86 18 40 20 86 6 128-6 18-16 34-28 48" fill="url(#g)" opacity="0.85"/>
    <circle cx="396" cy="220" r="48" fill="#F6A77E"/>
  </g>

  <!-- Figur 2 -->
  <g filter="url(#soft)">
    <path d="M640 520c46-40 70-90 70-145 0-92-68-165-160-165-58 0-105 26-132 78-22 40-26 86-14 130 6 20 15 38 28 54" fill="#F28C5B" opacity="0.85"/>
    <circle cx="560" cy="230" r="52" fill="#F6A77E"/>
  </g>

  <!-- Baby (zentrale Form) -->
  <g>
    <circle cx="475" cy="410" r="54" fill="#FFFFFF"/>
    <circle cx="475" cy="410" r="44" fill="#FFD7C2"/>
    <path d="M455 410a20 20 0 0 1 40 0c0 14-16 26-20 26s-20-12-20-26Z" fill="#F28C5B"/>
  </g>

  <!-- Umarmungslinien -->
  <path d="M320 520c60 40 120 40 180 0" stroke="#F28C5B" stroke-width="14" stroke-linecap="round"/>
  <path d="M630 520c-60 40-120 40-180 0" stroke="#F6A77E" stroke-width="14" stroke-linecap="round"/>

</svg>

